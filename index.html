<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#06060f" />
    <title>Whirl — fall inward, relight the dark</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #06060f; }
      #app { position: fixed; inset: 0; }
      #stage { display: block; width: 100%; height: 100%; touch-action: none; cursor: crosshair; }
      #ui-root { position: absolute; inset: 0; pointer-events: none; }
      #ui-root > * { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="stage"></canvas>
      <div id="ui-root"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
